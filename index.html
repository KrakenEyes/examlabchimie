<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Chimie — Test de Labo</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; padding: 2rem 1rem; }
  h1 { text-align: center; font-size: 2rem; color: #38bdf8; margin-bottom: 0.5rem; }
  .subtitle { text-align: center; color: #94a3b8; margin-bottom: 2rem; font-size: 0.9rem; }
  .progress-bar { background: #1e293b; border-radius: 8px; height: 8px; margin-bottom: 2rem; }
  .progress-fill { background: #38bdf8; height: 8px; border-radius: 8px; transition: width 0.3s; }
  .section-title { font-size: 1.2rem; color: #7dd3fc; border-left: 4px solid #38bdf8; padding-left: 0.8rem; margin: 2rem 0 1rem; }
  .question { background: #1e293b; border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; border: 1px solid #334155; }
  .question p { font-weight: 500; margin-bottom: 1rem; line-height: 1.5; }
  .options label { display: flex; align-items: flex-start; gap: 0.6rem; padding: 0.6rem 0.8rem; border-radius: 8px; cursor: pointer; transition: background 0.15s; margin-bottom: 0.4rem; border: 1px solid transparent; }
  .options label:hover { background: #334155; }
  .options input[type="radio"] { margin-top: 3px; accent-color: #38bdf8; flex-shrink: 0; }
  .options label.correct { background: #14532d; border-color: #22c55e; color: #86efac; }
  .options label.wrong { background: #450a0a; border-color: #ef4444; color: #fca5a5; }
  .options label.reveal { background: #14532d; border-color: #22c55e; color: #86efac; }
  .feedback { font-size: 0.85rem; margin-top: 0.5rem; padding: 0.5rem 0.8rem; border-radius: 6px; }
  .feedback.correct-msg { background: #14532d; color: #86efac; }
  .feedback.wrong-msg { background: #450a0a; color: #fca5a5; }
  .score-display { text-align: center; background: #1e293b; border-radius: 16px; padding: 2rem; margin-bottom: 2rem; border: 1px solid #334155; }
  .score-display .num { font-size: 3rem; font-weight: 700; color: #38bdf8; }
  .score-display p { color: #94a3b8; margin-top: 0.5rem; }
  .btn { display: block; margin: 2rem auto 0; background: #0284c7; color: white; border: none; padding: 0.9rem 2.5rem; border-radius: 10px; font-size: 1rem; cursor: pointer; transition: background 0.2s; }
  .btn:hover { background: #0369a1; }
  .btn-reset { background: #475569; margin-top: 1rem; }
  .btn-reset:hover { background: #334155; }

  /* JUMPSCARE */
  #sasha { display: none; position: fixed; inset: 0; background: #000; z-index: 9999; cursor: pointer; justify-content: center; align-items: center; flex-direction: column; }
  #sasha.active { display: flex; }
  #sasha-clown { font-size: 30vw; line-height: 1; animation: clownshake 0.08s infinite; filter: drop-shadow(0 0 30px #ff0000); }
  #sasha-text { font-size: 20vw; font-weight: 900; color: #ef4444; text-shadow: 0 0 40px #ef4444, 0 0 80px #ff0000; letter-spacing: -0.02em; animation: sashapulse 0.15s infinite alternate; user-select: none; }
  #sasha-sub { color: #fca5a5; font-size: 1.5rem; margin-top: 1rem; animation: sashapulse 0.2s infinite alternate; }
  @keyframes sashapulse { from { transform: scale(1); } to { transform: scale(1.04); } }
  @keyframes clownshake { 0%{transform:translate(-4px,-3px) rotate(-2deg);} 25%{transform:translate(4px,3px) rotate(2deg);} 50%{transform:translate(-3px,4px) rotate(-1deg);} 75%{transform:translate(3px,-4px) rotate(1deg);} 100%{transform:translate(-4px,2px) rotate(-2deg);} }

  @media (max-width: 600px) { h1 { font-size: 1.4rem; } }
</style>
</head>
<body>

<h1>⚗️ Quiz — Test de Labo Chimie</h1>
<p class="subtitle">5% de la note finale · ~20 questions affichées · Cliquer pour révéler les réponses</p>

<div class="score-display">
  <div class="num" id="score-num">0 / 0</div>
  <p id="score-msg">Réponds aux questions pour voir ton score</p>
</div>

<div class="progress-bar"><div class="progress-fill" id="progress" style="width:0%"></div></div>

<div id="quiz"></div>

<button class="btn" onclick="checkAll()">Corriger tout</button>
<button class="btn btn-reset" onclick="resetQuiz()">Recommencer</button>

<!-- JUMPSCARE -->
<div id="sasha" onclick="dismissSasha()">
  <div id="sasha-clown">🤡</div>
  <div id="sasha-text">SASHA</div>
  <div id="sasha-sub">👀 clique pour continuer</div>
</div>

<script>
const questions = [
  // === LAB 1 — CCM ===
  { section: "🔬 Lab 1 — Chromatographie (CCM)", q: "Que signifie l'acronyme CCM ?", opts: ["Chromatographie sur Couche Mince","Colonne Chromatographique Modulaire","Cristallisation par Condensation Mobile","Courant Chimique Mixte"], ans: 0 },
  { q: "Quelle est la formule du facteur de rétention Rf ?", opts: ["Distance parcourue par le composé / Distance parcourue par le front du solvant","Distance du front / Distance du composé","Masse du composé / Volume du solvant","Hauteur de la tache / Largeur de la plaque"], ans: 0 },
  { q: "Quelle est la phase stationnaire utilisée en CCM dans ce labo ?", opts: ["Gel de silice","Charbon actif","Alumine","Cellulose"], ans: 0 },
  { q: "Quel solvant est utilisé comme phase mobile dans ce labo de CCM ?", opts: ["Acétate d'éthyle","Eau distillée","Éthanol","Hexane"], ans: 0 },
  { q: "Pourquoi doit-on marquer la plaque CCM au crayon et non au stylo ?", opts: ["L'encre du stylo migrerait avec le solvant et fausserait les résultats","Le crayon adhère mieux à la silice","L'encre est toxique avec les réactifs","Pour des raisons esthétiques seulement"], ans: 0 },
  { q: "Quelle méthode détecte les composés aromatiques sur la plaque CCM ?", opts: ["Lampe UV","Chambre à iode","Réactif de Molisch","Flamme"], ans: 0 },
  { q: "Quel médicament contient UNIQUEMENT de l'acétaminophène ?", opts: ["Tylénol","Anacine","Exédrine","Empirine"], ans: 0 },
  { q: "Quel médicament contient acide acétylsalicylique + caféine SEULEMENT ?", opts: ["Anacine","Vanquish","Exédrine","Tylénol"], ans: 0 },
  { q: "Quel est l'intervalle de valeurs possibles pour Rf ?", opts: ["0 à 1","−1 à 1","0 à 100","1 à 10"], ans: 0 },
  { q: "Pourquoi faut-il éviter de toucher la silice avec les doigts ?", opts: ["Les huiles de la peau contaminent la plaque et créent des taches parasites","La silice est trop fragile","Pour éviter une réaction chimique","La chaleur des doigts fait fondre la silice"], ans: 0 },
  { q: "Lors de l'élution, pourquoi doit-on attendre 2-3 minutes avant d'insérer la plaque dans la cuve ?", opts: ["Pour saturer l'atmosphère de la cuve en vapeurs de solvant","Pour refroidir le solvant","Pour que la silice se fixe mieux","Pour évaporer l'excès d'eau"], ans: 0 },
  { q: "Un composé très polaire sur gel de silice (phase stationnaire polaire) aura un Rf :", opts: ["Faible (proche de 0)","Élevé (proche de 1)","Égal à 1","Négatif"], ans: 0 },

  // === LAB 2 — MODÈLES MOLÉCULAIRES ===
  { section: "🧪 Lab 2 — Modèles moléculaires & Isomérie", q: "Quelle est la formule du degré d'insaturation (DI) pour CₙHₘNₓOₚ ?", opts: ["DI = (2n + 2 − m + x) / 2","DI = (2n − m + 2) / 2","DI = n − m + 2","DI = (m − 2n + 2) / 2"], ans: 0 },
  { q: "Quelle hybridation possède un carbone d'une double liaison C=C ?", opts: ["sp²","sp³","sp","sp⁴"], ans: 0 },
  { q: "Combien d'isomères de structure possède C₅H₁₂ ?", opts: ["3","2","4","5"], ans: 0 },
  { q: "Lequel de ces isomères de C₅H₁₂ est le 2,2-diméthylpropane ?", opts: ["Un carbone central lié à 4 méthyles","Une chaîne droite de 5 carbones","Une chaîne de 4 carbones avec un méthyle en position 2","Aucune de ces réponses"], ans: 0 },
  { q: "Les isomères cis-trans sont un type d'isomérie :", opts: ["Stéréoisomérie géométrique","Isomérie de position","Isomérie fonctionnelle","Isomérie optique"], ans: 0 },
  { q: "Une conformation décalée (staggered) est-elle plus ou moins stable qu'une conformation éclipsée ?", opts: ["Plus stable","Moins stable","Également stable","Cela dépend de la température"], ans: 0 },
  { q: "La projection de Newman représente :", opts: ["Une vue le long d'une liaison C−C","La structure développée d'un composé","Les charges partielles d'une molécule","La rotation autour d'une liaison π"], ans: 0 },
  { q: "Le DI d'un alcyne (triple liaison) est :", opts: ["2","1","3","0"], ans: 0 },
  { q: "Quel type d'isomérie concerne des composés de même formule moléculaire mais de groupements fonctionnels différents ?", opts: ["Isomérie fonctionnelle","Isomérie de position","Stéréoisomérie","Isomérie conformationnelle"], ans: 0 },
  { q: "Un carbone sp³ a une géométrie :", opts: ["Tétraédrique","Trigonale plane","Linéaire","Pyramidale à base carrée"], ans: 0 },

  // === LABS 3 & 4 — ESTÉRIFICATION ===
  { section: "🍌 Labs 3 & 4 — Estérification (Huile de banane)", q: "Quels sont les deux réactifs de la synthèse de l'acétate d'isoamyle ?", opts: ["Acide acétique + 3-méthylbutan-1-ol","Acide chlorhydrique + éthanol","Acide sulfurique + pentanol","Acide acétique + méthanol"], ans: 0 },
  { q: "Quel est le catalyseur utilisé dans la réaction de Fischer ?", opts: ["H₂SO₄ (acide sulfurique)","NaOH","Pd/C","MgSO₄"], ans: 0 },
  { q: "Pourquoi utilise-t-on un excès d'acide acétique dans cette réaction ?", opts: ["Pour déplacer l'équilibre vers la formation du produit (principe de Le Chatelier)","Pour éviter l'ébullition","Pour neutraliser le NaOH","Pour augmenter la densité"], ans: 0 },
  { q: "Quel est le rôle du condenseur vertical (reflux) lors de la semaine 1 ?", opts: ["Recondenser les vapeurs et les retourner dans le ballon pour éviter les pertes","Refroidir le produit final","Séparer les réactifs","Absorber l'excès d'eau"], ans: 0 },
  { q: "Pourquoi lave-t-on la phase organique avec de l'eau glacée distillée d'abord ?", opts: ["Pour éliminer l'acide acétique et l'alcool en excès","Pour neutraliser l'ester","Pour faire cristalliser les impuretés","Pour augmenter le rendement"], ans: 0 },
  { q: "Quel est le rôle de NaHCO₃ (5%) lors du lavage de la phase organique ?", opts: ["Neutraliser l'acide acétique résiduel","Sécher la phase organique","Augmenter la solubilité de l'ester","Catalyser la réaction inverse"], ans: 0 },
  { q: "Quel agent desséchant est utilisé pour sécher la phase organique ?", opts: ["MgSO₄ anhydre","NaCl","CaCl₂","Na₂SO₄"], ans: 0 },
  { q: "À quel température (environ) recueille-t-on l'acétate d'isoamyle lors de la distillation simple ?", opts: ["142°C","90°C","117°C","65°C"], ans: 0 },
  { q: "Quelle est la formule du rendement (%) ?", opts: ["(Masse obtenue / Masse théorique) × 100","(Masse théorique / Masse obtenue) × 100","(Volume obtenu / Volume théorique) × 100","Masse obtenue × 100"], ans: 0 },
  { q: "En spectroscopie IR, à quelle fréquence approximative observe-t-on la vibration C=O d'un ester ?", opts: ["~1735 cm⁻¹","~3300 cm⁻¹","~2900 cm⁻¹","~1600 cm⁻¹"], ans: 0 },
  { q: "Pourquoi ajoute-t-on des pierres ponce (nucléateurs d'ébullition) lors de la distillation ?", opts: ["Pour éviter l'ébullition violente (bumping)","Pour catalyser la réaction","Pour absorber l'humidité","Pour filtrer les impuretés"], ans: 0 },
  { q: "La réaction d'estérification de Fischer est :", opts: ["Réversible (équilibre)","Irréversible","Spontanée sans catalyseur","Endothermique uniquement"], ans: 0 },

  // === LAB 5 — SAPONIFICATION ===
  { section: "🧼 Lab 5 — Saponification", q: "La saponification est :", opts: ["L'hydrolyse basique des graisses (esters) par NaOH","L'estérification d'acides gras","La réduction de triglycérides","L'oxydation d'alcools gras"], ans: 0 },
  { q: "Quels sont les deux produits de la saponification d'un triglycéride ?", opts: ["Glycérol + sels de carboxylates (savon)","Glycérol + acides gras libres","Eau + alcool","CO₂ + eau"], ans: 0 },
  { q: "Pourquoi la réaction de saponification est-elle considérée irréversible ?", opts: ["La base forte (NaOH) déplace l'équilibre totalement vers les produits","La chaleur détruit les réactifs","L'eau est éliminée au fur et à mesure","Elle produit un gaz qui s'échappe"], ans: 0 },
  { q: "Quelle est la structure amphiphile d'un savon ?", opts: ["Tête hydrophile (COO⁻Na⁺) + queue hydrophobe (chaîne alkyle)","Tête hydrophobe + queue hydrophile","Deux têtes hydrophiles","Molécule totalement apolaire"], ans: 0 },
  { q: "Pourquoi le savon est-il inefficace en eau dure ?", opts: ["Les ions Ca²⁺ et Mg²⁺ forment un précipité insoluble avec le savon","L'eau dure est trop chaude","Le pH de l'eau dure détruit le savon","L'eau dure contient trop de NaCl"], ans: 0 },
  { q: "Lors de la saponification au labo, que signifie atteindre la 'trace' ?", opts: ["L'émulsion s'épaissit (comme une crème), signe que la saponification avance","Le savon est complètement solidifié","La réaction est terminée et le pH est neutre","Une tache brune apparaît à la surface"], ans: 0 },
  { q: "Quels acides gras sont mentionnés dans le labo de saponification ?", opts: ["Palmitique, stéarique, oléique, arachidonique","Citrique, tartrique, lactique","Acétique, propionique, butyrique","Glutamique, aspartique, lysique"], ans: 0 },
  { q: "Pourquoi laisse-t-on curer le savon pendant 2 semaines ?", opts: ["Pour permettre à l'excès de NaOH de réagir complètement et adoucir le savon","Pour le parfumer davantage","Pour augmenter sa taille","Pour le durcir par évaporation de l'huile"], ans: 0 },
  { q: "Quelle huile végétale est utilisée en PLUS grande quantité dans le protocole du labo ?", opts: ["Huile d'olive (~38g)","Huile de coco (~12g)","Huile de palme","Huile de tournesol"], ans: 0 },
  { q: "Quelle réaction se passe quand du savon rencontre CaCl₂ ?", opts: ["2 RCOONa + CaCl₂ → (RCOO)₂Ca↓ + 2 NaCl","RCOONa + CaCl₂ → RCOOCa + NaCl","Aucune réaction","RCOONa + CaCl₂ → RCOOH + NaCaCl"], ans: 0 },
];

let answered = {};

function buildQuiz() {
  const container = document.getElementById('quiz');
  container.innerHTML = '';
  let currentSection = '';
  questions.forEach((q, i) => {
    if (q.section && q.section !== currentSection) {
      currentSection = q.section;
      const st = document.createElement('h2');
      st.className = 'section-title';
      st.textContent = currentSection;
      container.appendChild(st);
    }
    const div = document.createElement('div');
    div.className = 'question';
    div.id = 'q' + i;
    const qnum = i + 1;
    div.innerHTML = `<p><strong>${qnum}.</strong> ${q.q}</p>
      <div class="options" id="opts${i}">
        ${q.opts.map((o, j) => `<label id="lbl${i}_${j}"><input type="radio" name="q${i}" value="${j}" onchange="checkOne(${i})"> ${o}</label>`).join('')}
      </div>
      <div class="feedback" id="fb${i}" style="display:none"></div>`;
    container.appendChild(div);
  });
  updateScore();
}

function checkOne(i) {
  if (answered[i] !== undefined) return;
  const selected = document.querySelector(`input[name="q${i}"]:checked`);
  if (!selected) return;
  const val = parseInt(selected.value);
  const correct = questions[i].ans;
  answered[i] = val === correct;

  // disable all options
  document.querySelectorAll(`input[name="q${i}"]`).forEach(inp => inp.disabled = true);

  const lbl = document.getElementById(`lbl${i}_${val}`);
  lbl.classList.add(val === correct ? 'correct' : 'wrong');
  if (val !== correct) {
    document.getElementById(`lbl${i}_${correct}`).classList.add('reveal');
  }
  const fb = document.getElementById(`fb${i}`);
  fb.style.display = 'block';
  fb.className = 'feedback ' + (val === correct ? 'correct-msg' : 'wrong-msg');
  fb.textContent = val === correct ? '✓ Bonne réponse !' : `✗ La bonne réponse était : « ${questions[i].opts[correct]} »`;
  updateScore();
}

function checkAll() {
  questions.forEach((q, i) => {
    if (answered[i] !== undefined) return;
    const selected = document.querySelector(`input[name="q${i}"]:checked`);
    if (selected) { checkOne(i); return; }
    // reveal unanswered
    answered[i] = false;
    document.querySelectorAll(`input[name="q${i}"]`).forEach(inp => inp.disabled = true);
    document.getElementById(`lbl${i}_${q.ans}`).classList.add('reveal');
    const fb = document.getElementById(`fb${i}`);
    fb.style.display = 'block';
    fb.className = 'feedback wrong-msg';
    fb.textContent = `— Non répondu. La réponse était : « ${q.opts[q.ans]} »`;
  });
  updateScore();
}

function updateScore() {
  const total = Object.keys(answered).length;
  const correct = Object.values(answered).filter(Boolean).length;
  document.getElementById('score-num').textContent = `${correct} / ${total}`;
  const pct = questions.length > 0 ? (total / questions.length) * 100 : 0;
  document.getElementById('progress').style.width = pct + '%';
  if (total === 0) {
    document.getElementById('score-msg').textContent = 'Réponds aux questions pour voir ton score';
  } else if (total === questions.length) {
    const p = Math.round((correct / questions.length) * 100);
    document.getElementById('score-msg').textContent = `Quiz terminé ! ${p}% de réussite${p >= 80 ? ' 🎉' : p >= 60 ? ' 💪' : ' 📚 Révise encore !'}`;
  } else {
    document.getElementById('score-msg').textContent = `${total} question${total > 1 ? 's' : ''} répondue${total > 1 ? 's' : ''} sur ${questions.length}`;
  }
}

function resetQuiz() {
  answered = {};
  buildQuiz();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// JUMPSCARE
function playScream() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const dur = 1.8;
    // layered noise bursts to simulate a scream
    [0, 0.05, 0.1].forEach(offset => {
      const buf = ctx.createBuffer(1, ctx.sampleRate * dur, ctx.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < data.length; i++) {
        data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (ctx.sampleRate * 0.4));
      }
      const src = ctx.createBufferSource();
      src.buffer = buf;
      // bandpass filter around voice frequencies
      const bp = ctx.createBiquadFilter();
      bp.type = 'bandpass';
      bp.frequency.value = 900 + offset * 3000;
      bp.Q.value = 0.8;
      const gain = ctx.createGain();
      gain.gain.setValueAtTime(3.5, ctx.currentTime + offset);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + offset + dur);
      src.connect(bp);
      bp.connect(gain);
      gain.connect(ctx.destination);
      src.start(ctx.currentTime + offset);
    });
    // low thud
    const osc = ctx.createOscillator();
    const g2 = ctx.createGain();
    osc.frequency.setValueAtTime(80, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(20, ctx.currentTime + 0.5);
    g2.gain.setValueAtTime(4, ctx.currentTime);
    g2.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.6);
    osc.connect(g2);
    g2.connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + 0.6);
  } catch(e) {}
}

function initSasha() {
  if (localStorage.getItem('sasha_seen')) return;
  setTimeout(() => {
    if (localStorage.getItem('sasha_seen')) return;
    playScream();
    document.getElementById('sasha').classList.add('active');
  }, 30000);
}

function dismissSasha() {
  document.getElementById('sasha').classList.remove('active');
  localStorage.setItem('sasha_seen', '1');
}

buildQuiz();
initSasha();
</script>
</body>
</html>
